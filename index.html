<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <title>Baby Tracker 🍼</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
      --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b96;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --r: 8px; --rl: 12px; --rxl: 16px;
      --green: #1D9E75; --gbg: #E1F5EE; --gtext: #0F6E56;
      --blue: #378ADD; --bbg: #E6F1FB; --btext: #185FA5;
      --amber: #BA7517; --abg: #FAEEDA; --atext: #854F0B;
      --pink: #D4537E; --pbg: #FBEAF0; --ptext: #993556;
      --red: #E24B4A;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
        --text:#f0efe9;--text2:#a0a09b;--text3:#6b6b66;
        --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
        --gbg:#0d3326;--gtext:#5DCAA5;
        --bbg:#0c2540;--btext:#85B7EB;
        --abg:#2d1f05;--atext:#EF9F27;
        --pbg:#2d1020;--ptext:#ED93B1;
      }
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
         background:var(--bg3);color:var(--text);min-height:100vh}
    .app{max-width:480px;margin:0 auto;padding:1rem;padding-bottom:5rem}

    /* HEADER */
    .baby-header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;
      padding:12px 14px;background:var(--bg);border:0.5px solid var(--border);
      border-radius:var(--rl)}
    .baby-avatar{width:42px;height:42px;border-radius:50%;background:var(--pbg);
      display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .baby-name{font-weight:600;font-size:15px}
    .baby-sub{font-size:12px;color:var(--text2);margin-top:2px}
    .age-pill{margin-left:auto;background:var(--bbg);color:var(--btext);
      font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px}

    /* FORMULA CARD */
    .formula-card{border:1.5px solid var(--green);background:var(--gbg);
      border-radius:var(--rl);padding:14px 16px;margin-bottom:12px}
    .formula-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .formula-label{font-size:11px;font-weight:600;letter-spacing:.05em;
      color:var(--gtext);text-transform:uppercase;margin-bottom:2px}
    .formula-sub{font-size:13px;color:var(--text2)}
    .formula-tag{font-size:11px;color:var(--gtext);background:rgba(29,158,117,.12);
      padding:3px 9px;border-radius:12px;font-weight:500;white-space:nowrap}
    .formula-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .formula-box{background:rgba(255,255,255,.6);border-radius:10px;padding:12px;text-align:center}
    @media(prefers-color-scheme:dark){.formula-box{background:rgba(255,255,255,.08)}}
    .formula-big{font-size:28px;font-weight:600;color:var(--gtext);line-height:1}
    .formula-unit{font-size:11px;color:var(--text2);margin-top:2px}
    .formula-note{margin-top:10px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}

    /* FEEDS/DAY SELECTOR */
    .feeds-day-card{background:var(--bg);border:0.5px solid var(--border);
      border-radius:var(--rl);padding:12px 16px;margin-bottom:12px;
      display:flex;align-items:center;gap:10px}
    .feeds-day-label{font-size:12px;color:var(--text2);flex:1}
    .feeds-day-ctrl{display:flex;align-items:center;gap:10px}
    .feeds-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);
      background:var(--bg2);font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;color:var(--text)}
    .feeds-val{font-size:20px;font-weight:600;min-width:28px;text-align:center}

    /* CARDS */
    .card{background:var(--bg);border:0.5px solid var(--border);
      border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1rem}
    .label{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}

    /* TABS */
    .tab-bar{display:flex;gap:4px;background:var(--bg2);border-radius:var(--rl);
      padding:4px;margin-bottom:1.25rem}
    .tab{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:500;
      border-radius:var(--r);cursor:pointer;color:var(--text2);border:none;
      background:transparent;transition:all .15s}
    .tab.active{background:var(--bg);color:var(--text);border:0.5px solid var(--border)}

    /* BUTTONS */
    .btn-group{display:flex;gap:8px}
    .sel-btn{flex:1;padding:12px 6px;border:0.5px solid var(--border2);border-radius:var(--r);
      cursor:pointer;font-size:13px;font-weight:500;background:var(--bg2);
      color:var(--text2);text-align:center;transition:all .15s}
    .sel-btn.on-green{border:2px solid var(--green);background:var(--gbg);color:var(--gtext)}
    .sel-btn.on-blue{border:2px solid var(--blue);background:var(--bbg);color:var(--btext)}
    .sel-btn.on-amber{border:2px solid var(--amber);background:var(--abg);color:var(--atext)}
    .sel-btn.on-coral{border:2px solid #993C1D;background:#FAECE7;color:#993C1D}
    .primary-btn{width:100%;padding:14px;background:var(--text);color:var(--bg);
      border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer}
    .sec-btn{width:100%;padding:12px;background:var(--bg2);color:var(--text2);
      border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;cursor:pointer;margin-top:8px}

    /* ML INPUT */
    .ml-row{display:flex;align-items:center;gap:8px;margin-top:10px}
    .ml-display{font-size:36px;font-weight:600;color:var(--text);flex:1;text-align:center}
    .ml-adj{width:44px;height:44px;border-radius:50%;border:0.5px solid var(--border2);
      background:var(--bg2);font-size:20px;cursor:pointer;display:flex;
      align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
    .ml-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .ml-preset{padding:5px 12px;border:0.5px solid var(--border);border-radius:20px;
      font-size:12px;background:var(--bg2);color:var(--text2);cursor:pointer}
    .ml-preset.target{border-color:var(--green);color:var(--gtext);background:var(--gbg)}

    /* HISTORY */
    .feed-item{display:flex;align-items:center;gap:12px;padding:10px 0;
      border-bottom:0.5px solid var(--border)}
    .feed-item:last-child{border-bottom:none}
    .feed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .feed-info{flex:1}
    .feed-time{font-size:14px;font-weight:500}
    .feed-ml{font-size:13px;color:var(--text2)}
    .feed-ml .vs-rec{font-size:11px;padding:1px 7px;border-radius:10px;margin-left:6px}
    .vs-ok{background:var(--gbg);color:var(--gtext)}
    .vs-low{background:var(--abg);color:var(--atext)}
    .vs-high{background:var(--bbg);color:var(--btext)}
    .delete-feed{font-size:18px;color:var(--text3);cursor:pointer;padding:4px;
      background:none;border:none}

    /* SUMMARY CHIPS */
    .summary-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
    .chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
      background:var(--bg);border:0.5px solid var(--border)}
    .chip.green{background:var(--gbg);color:var(--gtext);border-color:var(--green)}
    .chip.amber{background:var(--abg);color:var(--atext);border-color:var(--amber)}
    .chip.blue{background:var(--bbg);color:var(--btext);border-color:var(--blue)}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);
      border-top:0.5px solid var(--border);display:flex;z-index:100}
    .nav-item{flex:1;padding:10px 0 12px;display:flex;flex-direction:column;
      align-items:center;gap:3px;cursor:pointer;border:none;background:none;
      color:var(--text3);font-size:10px;font-weight:500;transition:color .15s}
    .nav-item.active{color:var(--blue)}
    .nav-icon{font-size:22px}

    /* ALARM */
    .alarm-ring{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
      z-index:200;align-items:center;justify-content:center}
    .alarm-ring.show{display:flex}
    .alarm-box{background:var(--bg);border-radius:var(--rxl);padding:32px 24px;
      text-align:center;max-width:300px;width:90%;animation:bounce .4s ease}
    @keyframes bounce{0%{transform:scale(.8)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
    .alarm-emoji{font-size:52px;margin-bottom:12px}
    .alarm-title{font-size:20px;font-weight:700;margin-bottom:6px}
    .alarm-sub{font-size:14px;color:var(--text2);margin-bottom:24px}
    .alarm-stop{width:100%;padding:16px;background:var(--red);color:#fff;
      border:none;border-radius:var(--rl);font-size:16px;font-weight:700;cursor:pointer}
    .alarm-snooze{width:100%;padding:12px;background:var(--bg2);color:var(--text2);
      border:0.5px solid var(--border);border-radius:var(--r);font-size:14px;
      cursor:pointer;margin-top:8px}

    /* WEIGHT */
    .weight-input{width:100%;padding:14px;font-size:24px;font-weight:600;text-align:center;
      border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);
      color:var(--text);outline:none}
    .chart-wrap{position:relative;width:100%;height:220px;margin-top:12px}

    /* ONBOARDING */
    .onboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:2rem;text-align:center}
    .onboard-logo{font-size:56px;margin-bottom:16px}
    .onboard-title{font-size:26px;font-weight:700;margin-bottom:8px}
    .onboard-sub{font-size:15px;color:var(--text2);margin-bottom:40px}
    .text-input{width:100%;padding:13px;border:0.5px solid var(--border2);border-radius:var(--r);
      background:var(--bg2);color:var(--text);font-size:15px;outline:none;margin-bottom:10px}
    .code-display{font-size:36px;font-weight:700;letter-spacing:.2em;color:var(--blue);
      background:var(--bbg);padding:16px 24px;border-radius:var(--rl);margin:16px 0}
    .error-msg{color:var(--red);font-size:13px;margin-bottom:8px}

    /* DIAPER */
    .diaper-item{display:flex;align-items:center;gap:10px;padding:8px 0;
      border-bottom:.5px solid var(--border)}
    .diaper-icon{font-size:20px;width:28px;text-align:center}
    .diaper-info{flex:1;font-size:13px}
    .diaper-time{font-size:12px;color:var(--text2)}

    /* SECTION HEADER */
    .section-hdr{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text3);
      text-transform:uppercase;margin-bottom:10px;margin-top:4px}

    /* ALARM SETTINGS */
    .alarm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;
      border-bottom:.5px solid var(--border)}
    .alarm-row:last-child{border-bottom:none}
    .toggle{width:44px;height:26px;border-radius:13px;background:var(--border2);
      position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
    .toggle.on{background:var(--green)}
    .toggle-knob{width:20px;height:20px;background:#fff;border-radius:50%;
      position:absolute;top:3px;left:3px;transition:transform .2s}
    .toggle.on .toggle-knob{transform:translateX(18px)}
    input[type=range]{width:100%;accent-color:var(--blue)}
  </style>
</head>
<body>

<!-- ALARM OVERLAY -->
<div class="alarm-ring" id="alarmRing">
  <div class="alarm-box">
    <div class="alarm-emoji">🍼</div>

<div id="root"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, deleteDoc, query, orderBy, where, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ── CONFIG ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyC1bF0rLXkhNkUP_-KqctPFNeCMS1rFCUM",
  authDomain: "baby-tracker-d1058.firebaseapp.com",
  projectId: "baby-tracker-d1058",

// ── STATE ──────────────────────────────────────────────────────────────
let currentGroup = null;
let groupCode    = localStorage.getItem('babyGroupCode') || '';
let currentTab   = 'feed';
let currentDashTab = 'daily';
let feedMl       = 120;
let feedType     = 'bottle';
let diaperType   = 'wet';
let alarmOn      = true;
let alarmInterval= 3;
let alarmTimer   = null;
let alarmSound   = null;
let weightInput  = '';
let feedsPerDay  = 8;
let chartInstances = {};

// ── FORMULA BY AGE ─────────────────────────────────────────────────────
function getMilkFormula(birthDateStr, weightKg, feedsDay) {
  if (!birthDateStr || !weightKg || weightKg <= 0) return null;
  const birth   = new Date(birthDateStr);
  const ageDays = Math.floor((Date.now() - birth) / 86400000);
  const ageWeeks = ageDays / 7;
  let fMin, fMax, label, emoji;
  if (ageWeeks < 2)      { fMin=150; fMax=180; label='0–2 semanas';      emoji='🌱'; }
  else if (ageWeeks < 13){ fMin=150; fMax=150; label='2 sem – 3 meses';  emoji='🍼'; }
  else if (ageWeeks < 26){ fMin=120; fMax=150; label='3–6 meses';        emoji='👶'; }
  else                   { fMin= 90; fMax=120; label='6+ meses';         emoji='🧒'; }

  const dMin = Math.round(weightKg * fMin);
  const dMax = Math.round(weightKg * fMax);
  const pMin = feedsDay > 0 ? Math.round(dMin / feedsDay) : 0;
  const pMax = feedsDay > 0 ? Math.round(dMax / feedsDay) : 0;

  let ageLabel;
  if (ageDays < 14)       ageLabel = ageDays + 'd';
  else if (ageDays < 60)  ageLabel = Math.floor(ageDays/7) + 'sem';
  else if (ageDays < 365) ageLabel = Math.floor(ageDays/30) + 'm';
  else                    ageLabel = (ageDays/365).toFixed(1) + 'a';

  const sameF = fMin === fMax;
  return {
    factorStr: sameF ? `${fMin}` : `${fMin}–${fMax}`,
    dailyStr:  sameF ? `${dMin}` : `${dMin}–${dMax}`,
    perFeedStr:sameF ? `${pMin}` : `${pMin}–${pMax}`,
    perFeedTarget: Math.round((pMin + pMax) / 2),
    label, emoji, ageLabel,
    dMin, dMax, pMin, pMax, ageDays
  };
}

function formulaCard(f, feeds) {
  if (!f) return '';
  return `
  <div class="formula-card">
    <div class="formula-header">
      <div>
        <div class="formula-label">🍼 Recomendación por edad</div>
        <div class="formula-sub">${f.emoji} ${f.label} · ${f.ageLabel} · ${currentGroup?.babyWeight || '?'} kg</div>
      </div>
      <div class="formula-tag">${f.factorStr} ml/kg/día</div>
    </div>
    <div class="formula-grid">
      <div class="formula-box">
        <div class="formula-unit">Total diario</div>
        <div class="formula-big">${f.dailyStr}</div>
        <div class="formula-unit">ml / día</div>
      </div>
      <div class="formula-box">
        <div class="formula-unit">Por toma (${feeds} tomas)</div>
        <div class="formula-big">${f.perFeedStr}</div>
        <div class="formula-unit">ml / toma</div>
      </div>
    </div>
    <div class="formula-note">ℹ️ Referencia. Cada bebé es diferente — confiá en su señal de hambre.</div>
  </div>`;
}

function feedsDayCtrl() {
  return `
  <div class="feeds-day-card">
    <span class="feeds-day-label">Tomas por día (para calcular ml/toma)</span>
    <div class="feeds-day-ctrl">
      <button class="feeds-btn" onclick="changeFeedsDay(-1)">−</button>
      <span class="feeds-val" id="feedsDayVal">${feedsPerDay}</span>
      <button class="feeds-btn" onclick="changeFeedsDay(+1)">+</button>
    </div>
  </div>`;
}

window.changeFeedsDay = function(d) {
  feedsPerDay = Math.max(1, Math.min(16, feedsPerDay + d));
  document.getElementById('feedsDayVal').textContent = feedsPerDay;
  // recalculate ml presets based on new formula
  if (currentGroup) {
    const f = getMilkFormula(currentGroup.babyBirthdate, parseFloat(currentGroup.babyWeight), feedsPerDay);
    renderFeedTab(f);
  }
};

// ── HELPERS ────────────────────────────────────────────────────────────
function genCode() {
  return Math.random().toString(36).slice(2,8).toUpperCase();
}
function fmt(ts) {
  const d = ts?.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts) {
  const d = ts?.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});
}
function calcAge(birthStr) {
  if (!birthStr) return '';
  const d = Math.floor((Date.now() - new Date(birthStr)) / 86400000);
  if (d < 7)   return d + ' días';
  if (d < 30)  return Math.floor(d/7) + ' sem';
  if (d < 365) return Math.floor(d/30) + ' meses';
  return (d/365).toFixed(1) + ' años';
}
function vsClass(ml, f) {
  if (!f) return '';
  if (ml >= f.pMin && ml <= f.pMax) return 'vs-ok';
  if (ml < f.pMin) return 'vs-low';
  return 'vs-high';
}
function vsLabel(ml, f) {
  if (!f) return '';
  if (ml >= f.pMin && ml <= f.pMax) return '✓ OK';
  if (ml < f.pMin) return '↓ bajo';
  return '↑ alto';
}

// ── RENDER: ONBOARDING ─────────────────────────────────────────────────
function renderOnboarding(mode) {
  const root = document.getElementById('root');
  if (mode === 'home') {
    root.innerHTML = `
    <div class="onboard">
      <div class="onboard-logo">🍼</div>
      <div class="onboard-title">Baby Tracker</div>
      <div class="onboard-sub">Registrá cada toma, pañal y peso en tiempo real con tu pareja</div>
      <button class="primary-btn" onclick="renderOnboarding('create')" style="margin-bottom:10px">
        Crear grupo familiar
      </button>
      <button class="sec-btn" onclick="renderOnboarding('join')">Unirse con código</button>
    </div>`;
  } else if (mode === 'create') {
    root.innerHTML = `
    <div class="onboard">
      <div style="width:100%;max-width:360px">
        <div class="onboard-logo">👶</div>
        <div class="onboard-title">Datos del bebé</div>
        <input class="text-input" id="bName" placeholder="Nombre del bebé" />
        <input class="text-input" id="bDate" type="date" placeholder="Fecha de nacimiento" />
        <input class="text-input" id="bWeight" type="number" step="0.1" placeholder="Peso actual (kg) ej: 3.5" />
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button id="sexF" class="sel-btn" onclick="pickSex('F')">👧 Niña</button>
          <button id="sexM" class="sel-btn" onclick="pickSex('M')">👦 Niño</button>
        </div>
        <div class="error-msg" id="createErr"></div>
        <button class="primary-btn" onclick="createGroup()">Crear y obtener código</button>
        <button class="sec-btn" onclick="renderOnboarding('home')">← Volver</button>
      </div>
    </div>`;
  } else if (mode === 'join') {
    root.innerHTML = `
    <div class="onboard">
      <div style="width:100%;max-width:360px">
        <div class="onboard-logo">🔗</div>
        <div class="onboard-title">Unirse al grupo</div>
        <div class="onboard-sub">Ingresá el código de 6 letras que te mandó tu pareja</div>
        <input class="text-input" id="joinCode" placeholder="Ej: ROSE47" style="text-transform:uppercase;font-size:22px;text-align:center;letter-spacing:.15em"/>
        <div class="error-msg" id="joinErr"></div>
        <button class="primary-btn" onclick="joinGroup()">Unirse</button>
        <button class="sec-btn" onclick="renderOnboarding('home')">← Volver</button>
      </div>
    </div>`;
  }
}

let pickedSex = 'F';
window.pickSex = function(s) {
  pickedSex = s;
  document.getElementById('sexF').className = 'sel-btn' + (s==='F'?' on-pink':'');
  document.getElementById('sexM').className = 'sel-btn' + (s==='M'?' on-blue':'');

window.createGroup = async function() {
  const name   = document.getElementById('bName').value.trim();
  const date   = document.getElementById('bDate').value;
  const weight = parseFloat(document.getElementById('bWeight').value);
  if (!name||!date||!weight) { document.getElementById('createErr').textContent='Completá todos los campos'; return; }
  const code = genCode();
  await setDoc(doc(db,'groups',code), {
    babyName: name, babyBirthdate: date, babySex: pickedSex,
    babyWeight: weight, code, createdAt: Timestamp.now()
  });
  localStorage.setItem('babyGroupCode', code);
  groupCode = code;
  loadGroup();
  alert('🎉 Código del grupo: ' + code + '\nCompartilo con tu pareja por WhatsApp');
};

window.joinGroup = async function() {
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (code.length < 4) { document.getElementById('joinErr').textContent='Código inválido'; return; }
  const snap = await getDoc(doc(db,'groups',code));
  if (!snap.exists()) { document.getElementById('joinErr').textContent='Grupo no encontrado'; return; }
  localStorage.setItem('babyGroupCode', code);
  groupCode = code;
  loadGroup();
};

// ── LOAD GROUP & SUBSCRIBE ─────────────────────────────────────────────
async function loadGroup() {
  if (!groupCode) { renderOnboarding('home'); return; }
  onSnapshot(doc(db,'groups',groupCode), snap => {
    if (!snap.exists()) { renderOnboarding('home'); return; }
    currentGroup = snap.data();
    renderApp();
  });
}

function renderTabContent(formula) {

// ── FEED TAB ───────────────────────────────────────────────────────────
function renderFeedTab(formula) {
  const content = document.getElementById('tabContent');
  const target  = formula ? formula.perFeedTarget : feedMl;
  // Build preset buttons including formula-based target
  let presets = [60,80,100,120,150,180,200];
  let presetsHtml = presets.map(p => {
    const isTarget = formula && p === target;
    return `<button class="ml-preset${isTarget?' target':''}" onclick="setMl(${p})">${p}ml${isTarget?' ✓':''}</button>`;
  }).join('');
  if (formula && !presets.includes(target)) {
    presetsHtml = `<button class="ml-preset target" onclick="setMl(${target})">${target}ml ✓</button>` + presetsHtml;
  }

  content.innerHTML = `
  ${feedsDayCtrl()}
  ${formulaCard(formula, feedsPerDay)}

  <div class="card">
    <div class="label">Tipo</div>
    <div class="btn-group">
      <button class="sel-btn${feedType==='bottle'?' on-blue':''}" onclick="setFeedType('bottle')">🍼 Biberón</button>
      <button class="sel-btn${feedType==='breast'?' on-pink':''}" onclick="setFeedType('breast')">🤱 Pecho</button>
      <button class="sel-btn${feedType==='mixed'?' on-amber':''}" onclick="setFeedType('mixed')">🔀 Mixta</button>
    </div>
    <div class="ml-row">
      <button class="ml-adj" onclick="adjustMl(-10)">−</button>
      <div class="ml-display"><span id="mlVal">${feedMl}</span> <span style="font-size:16px;color:var(--text2)">ml</span></div>
      <button class="ml-adj" onclick="adjustMl(+10)">+</button>
    </div>
    <div class="ml-presets">${presetsHtml}</div>
  </div>

  <button class="primary-btn" onclick="saveFeed()">Registrar toma</button>

  <div style="margin-top:1.25rem">
    <div class="section-hdr">Hoy</div>
    <div id="feedHistory" class="card" style="padding:0 1rem">Cargando...</div>
  </div>`;

  loadFeedHistory(formula);
}

window.setFeedType = function(t) {
  feedType = t;
  const formula = currentGroup ? getMilkFormula(currentGroup.babyBirthdate, parseFloat(currentGroup.babyWeight), feedsPerDay) : null;
  renderFeedTab(formula);
};
window.adjustMl = function(d) {
  feedMl = Math.max(0, feedMl + d);
  document.getElementById('mlVal').textContent = feedMl;
};
window.setMl = function(v) {
  feedMl = v;
  document.getElementById('mlVal').textContent = v;
};

window.saveFeed = async function() {
  await addDoc(collection(db,'groups',groupCode,'feedings'), {
    ml: feedMl, type: feedType, ts: Timestamp.now()
  });
  const formula = currentGroup ? getMilkFormula(currentGroup.babyBirthdate, parseFloat(currentGroup.babyWeight), feedsPerDay) : null;
  loadFeedHistory(formula);
  scheduleAlarm();
  // vibrate
  if (navigator.vibrate) navigator.vibrate(50);
};

async function loadFeedHistory(formula) {
  const el = document.getElementById('feedHistory');
  if (!el) return;
  const since = new Date(); since.setHours(0,0,0,0);
  const q = query(collection(db,'groups',groupCode,'feedings'),
    orderBy('ts','desc'), where('ts','>=',Timestamp.fromDate(since)));
  onSnapshot(q, snap => {
    if (!el) return;
    if (snap.empty) { el.innerHTML='<div style="padding:16px;color:var(--text2);text-align:center">Sin tomas hoy</div>'; return; }
    let total = 0;
    let html = '';
    snap.forEach(d => {
      const r = d.data();
      const ml = r.ml || 0;
      total += ml;
      const vc = vsClass(ml, formula);
      const vl = vsLabel(ml, formula);
      const typeEmoji = r.type==='breast'?'🤱':r.type==='mixed'?'🔀':'🍼';
      html += `<div class="feed-item">
        <div class="feed-dot" style="background:var(--blue)"></div>
        <div class="feed-info">
          <div class="feed-time">${typeEmoji} ${fmt(r.ts)}</div>
          <div class="feed-ml">${ml} ml
            ${formula ? `<span class="vs-rec ${vc}">${vl}</span>` : ''}
          </div>
        </div>
        <button class="delete-feed" onclick="deleteFeed('${d.id}')">×</button>
      </div>`;
    });
    el.innerHTML = html;
    // update summary
    const chips = document.querySelector('.summary-chips');
    if (chips) {
      const avg = snap.size ? Math.round(total/snap.size) : 0;
      chips.innerHTML = `
        <div class="chip green">${snap.size} tomas</div>
        <div class="chip blue">${total} ml total</div>
        <div class="chip">${avg} ml promedio</div>
        ${formula ? `<div class="chip ${total >= formula.dMin ? 'green' : 'amber'}">${total}/${formula.dailyStr} ml diario</div>` : ''}`;
    }
  });
}

window.deleteFeed = async function(id) {
  await deleteDoc(doc(db,'groups',groupCode,'feedings',id));
};

  content.innerHTML = `

    <button class="tab${currentDashTab==='daily'?' active':''}" onclick="switchDash('daily')">Resumen</button>

window.switchDash = function(tab) {
  currentDashTab = tab;
  const formula = currentGroup ? getMilkFormula(currentGroup.babyBirthdate, parseFloat(currentGroup.babyWeight), feedsPerDay) : null;
  renderDashContent(formula);
};

function renderDashContent(formula) {
  const el = document.getElementById('dashContent');
  if (!el) return;
  if (currentDashTab === 'daily') renderDashDaily(el, formula);
  if (currentDashTab === 'chart') renderDashChart(el);
  if (currentDashTab === 'weight') renderDashWeight(el);
}

async function renderDashDaily(el, formula) {
  const since = new Date(); since.setHours(0,0,0,0);
  const q = query(collection(db,'groups',groupCode,'feedings'),
    orderBy('ts','desc'), where('ts','>=',Timestamp.fromDate(since)));
  onSnapshot(q, snap => {
    let total = 0, count = 0;
    snap.forEach(d => { total += (d.data().ml||0); count++; });
    const avg = count ? Math.round(total/count) : 0;
    const pct = formula && formula.dMax > 0 ? Math.min(100, Math.round(total/formula.dMax*100)) : null;
    el.innerHTML = `
    <div class="summary-chips">
      <div class="chip green">${count} tomas</div>
      <div class="chip blue">${total} ml total</div>
      <div class="chip">${avg} ml prom</div>
    </div>
    ${formula ? `
    <div class="card" style="margin-bottom:12px">
      <div class="label">Progreso diario — objetivo ${formula.dailyStr} ml</div>
      <div style="background:var(--bg3);border-radius:6px;height:14px;overflow:hidden;margin-bottom:6px">
        <div style="height:100%;width:${pct||0}%;background:${pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)'};transition:width .4s;border-radius:6px"></div>
      </div>
      <div style="font-size:12px;color:var(--text2)">${total} ml de ${formula.dailyStr} ml (${pct||0}%)</div>
    </div>` : ''}
    ${formulaCard(formula, feedsPerDay)}`;
  });
}

async function renderDashChart(el) {
  el.innerHTML = `<div class="card"><div class="label">Últimas 7 días — ml por día</div><div class="chart-wrap"><canvas id="mlChart"></canvas></div></div>`;
  const since = new Date(); since.setDate(since.getDate()-7); since.setHours(0,0,0,0);
  const q = query(collection(db,'groups',groupCode,'feedings'),
    orderBy('ts','desc'), where('ts','>=',Timestamp.fromDate(since)));
  onSnapshot(q, snap => {
    const days = {}; const labels = [];
    for (let i=6;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const k = d.toLocaleDateString('es-AR',{weekday:'short',day:'numeric'});
      labels.push(k); days[k]=0;
    }
    snap.forEach(d => {
      const ts = d.data().ts?.toDate ? d.data().ts.toDate() : new Date();
      const k  = ts.toLocaleDateString('es-AR',{weekday:'short',day:'numeric'});
      if (days[k]!==undefined) days[k]+=(d.data().ml||0);
    });
    const canvas = document.getElementById('mlChart');
    if (!canvas) return;
    if (chartInstances.ml) chartInstances.ml.destroy();
    chartInstances.ml = new Chart(canvas, {
      type:'bar',
      data:{ labels, datasets:[{data:labels.map(l=>days[l]||0),backgroundColor:'#378ADD44',borderColor:'#378ADD',borderWidth:2,borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v+'ml'}}}}
    });
  });
}

async function renderDashWeight(el) {
  el.innerHTML = `
  <div class="card">
    <div class="label">Registrar peso</div>
    <input class="weight-input" id="weightInput" type="number" step="0.1" placeholder="${currentGroup?.babyWeight || '3.5'} kg" />

  </div>
  <div class="card">
    <div class="label">Curva de peso</div>
    <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
  </div>`;
  loadWeightChart();
}

window.saveWeight = async function() {
  const v = parseFloat(document.getElementById('weightInput').value);
  if (!v) return;
  await addDoc(collection(db,'groups',groupCode,'weights'), { kg: v, ts: Timestamp.now() });
  await updateDoc(doc(db,'groups',groupCode), { babyWeight: v });
  loadWeightChart();
};

async function loadWeightChart() {
  const q = query(collection(db,'groups',groupCode,'weights'), orderBy('ts','asc'));
  onSnapshot(q, snap => {
    const canvas = document.getElementById('weightChart');
    if (!canvas) return;
    if (chartInstances.weight) chartInstances.weight.destroy();
    const labels = [], data = [];
    snap.forEach(d => { labels.push(fmtDate(d.data().ts)); data.push(d.data().kg); });
    chartInstances.weight = new Chart(canvas, {
      type:'line',
      data:{ labels, datasets:[{data,borderColor:'#1D9E75',backgroundColor:'#1D9E7520',fill:true,tension:.4,pointRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'kg'}}}}
    });
  });
}

      </div>
      <div class="toggle${alarmOn?' on':''}" id="alarmToggle" onclick="toggleAlarm()">
        <div class="toggle-knob"></div>
      </div>
    </div>
    <div class="alarm-row">
      <div>

    </div>
    <input class="text-input" id="updateWeight" type="number" step="0.1"
      placeholder="Nuevo peso (kg)" value="${currentGroup?.babyWeight||''}" />
    <button class="primary-btn" onclick="updateBabyWeight()">Actualizar peso</button>
  </div>`;
}

window.copyCode = function() {
  navigator.clipboard.writeText(groupCode).then(() => alert('Código copiado: ' + groupCode));
};
window.toggleAlarm = function() {
  alarmOn = !alarmOn;
  document.getElementById('alarmToggle').className = 'toggle' + (alarmOn?' on':'');
  if (!alarmOn) clearTimeout(alarmTimer);
};
window.setAlarmInterval = function(v) {
  alarmInterval = parseFloat(v);
  renderAlarmTab();
};
window.updateBabyWeight = async function() {
  const v = parseFloat(document.getElementById('updateWeight').value);
  if (!v) return;
  await updateDoc(doc(db,'groups',groupCode), { babyWeight: v });
  alert('✓ Peso actualizado a ' + v + ' kg');
};

// ── ALARM ENGINE ───────────────────────────────────────────────────────
function scheduleAlarm() {
  if (!alarmOn) return;
  clearTimeout(alarmTimer);
  alarmTimer = setTimeout(fireAlarm, alarmInterval * 3600000);
}
function fireAlarm() {
  document.getElementById('alarmRing').classList.add('show');
  document.getElementById('alarmSub').textContent =
    'Han pasado ' + alarmInterval + 'h desde la última toma';
  // audio
  try {
    const ctx = new AudioContext();
    const beep = () => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; gain.gain.value = 0.3;
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    };
    let i=0; alarmSound = setInterval(() => { beep(); i++; if(i>30) clearInterval(alarmSound); }, 800);
  } catch(e) {}
}
window.stopAlarm = function() {
  document.getElementById('alarmRing').classList.remove('show');
  clearInterval(alarmSound);
};
window.snoozeAlarm = function(min) {
  window.stopAlarm();
  alarmTimer = setTimeout(fireAlarm, min * 60000);
};

// ── BOOT ───────────────────────────────────────────────────────────────
loadGroup();
</script>
